<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Current Time</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f4f8;
        }
        .card {
            background: white;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .time {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2563eb;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Current Time</h1>
    <p class="time" th:text="${time}">2022-01-05 12:05:01 UTC</p>
</div>
</body>
</html>
